<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Каталог скидок</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1 onclick="displayFeatured()">Каталог аукционных товаров</h1>
    <div class="filters">
        <input type="text" id="category" placeholder="Категория" />
        <input type="text" id="name" placeholder="Название товара" />
        <select id="sortType">
            <option value="0">Сначала больше скидка</option>
            <option value="1">Сначала дешевле</option>
        </select>
        <button onclick="search()">Найти</button>
    </div>
<h2 id="title">Хиты продаж</h2>
    <div id ="featured" class="product-grid"></div>
    <div id="results" class="product-grid"></div>
    <div id="pagination" class="pagination"></div>
    <script src="script.js"></script>
</body>
</html>
